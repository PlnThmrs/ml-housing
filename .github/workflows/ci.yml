name: CI - Python Quality Checks

on:
  push:
    branches: [ develop, master ]
  pull_request:
    branches: [ master ]

jobs:
  # 1. Vérification du Linting (Ruff)
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff Check
        run: ruff check .

  # 2. Vérification du Formatage (Black/Ruff)
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Format Tools
        run: pip install ruff black
      - name: Check Style
        run: |
          ruff format --check .
          black --check .

  # 3. Vérification de la Sécurité (Bandit)
  security:
    runs-on: ubuntu-latest
    needs: [lint, format, tests]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Bandit
        run: pip install bandit
      - name: Run Security Scan
        run: bandit -r src/

  # 4. Tests unitaires et d'intégration
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run Pytest
        run: pytest -v --cov=src
  
  # 5. Build des images Docker pour valider la containerisation
  docker-build:
    runs-on: ubuntu-latest
    needs: [security]
    steps:
      - uses: actions/checkout@v4
      - name: Build Backend and Frontend Images
        run: |
          mkdir -p artifacts/models
          mkdir -p artifacts/preprocessing
          touch artifacts/models/model_latest.joblib
          touch artifacts/preprocessing/preprocessing_latest.joblib
          docker build -t housing-backend -f backend/Dockerfile .
          docker build -t housing-frontend -f frontend/Dockerfile .

  # 6. Déploiement vers l'environnement de Staging (Push vers GHCR)
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [docker-build] # Dépend du succès du build Docker
    if: github.ref == 'refs/heads/develop' # Se déclenche uniquement sur la branche develop
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: set lower case owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: '${{ github.actor }}'

      - name: Tag and Push Staging Images
        run: |
          # Re-build les images avec le tag GHCR pour le push
          mkdir -p artifacts/models
          mkdir -p artifacts/preprocessing
          touch artifacts/models/model_latest.joblib
          touch artifacts/preprocessing/preprocessing_latest.joblib
          docker build -t ghcr.io/$OWNER_LC/backend:staging -f backend/Dockerfile .
          docker build -t ghcr.io/$OWNER_LC/frontend:staging -f frontend/Dockerfile .
          docker push ghcr.io/$OWNER_LC/backend:staging
          docker push ghcr.io/$OWNER_LC/frontend:staging

